<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Screenshot</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e1e1e;
      color: #eee;
    }
    header {
      position: sticky;
      top: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #2a2a2a;
      border-bottom: 1px solid #000;
      z-index: 10;
    }
    .meta { flex: 1 1 200px; min-width: 0; }
    .meta .title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta .dims { opacity: 0.6; font-size: 12px; }
    button {
      font: inherit;
      font-weight: 600;
      padding: 8px 14px;
      border: 0;
      border-radius: 8px;
      background: #2d7ef7;
      color: #fff;
      cursor: pointer;
    }
    button.secondary { background: #444; }
    button:hover { filter: brightness(1.1); }
    button:active { transform: translateY(1px); }
    .stage {
      padding: 24px;
      display: flex;
      justify-content: center;
    }
    img {
      max-width: 100%;
      height: auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      background: #fff;
    }
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
    #empty { padding: 48px; text-align: center; opacity: 0.7; }
  </style>
</head>
<body>
  <header>
    <div class="meta">
      <div class="title" id="title">Screenshot</div>
      <div class="dims" id="dims"></div>
    </div>
    <button id="png">Save PNG</button>
    <button id="jpeg" class="secondary">Save JPEG</button>
    <button id="pdf" class="secondary">Save PDF</button>
    <button id="copy" class="secondary">Copy</button>
  </header>
  <div class="stage"><img id="preview" alt="Captured page" /></div>
  <div id="empty" hidden>No screenshot found. Trigger a capture from the toolbar button.</div>
  <div id="toast"></div>
  <script src="result.js"></script>
</body>
</html>
